#------ Stylish_player ALSA Pipe section B@lbuze 2026 March-------

pcm.sp_in {
    type plug
    slave.pcm "duplex"
}

pcm.duplex {
    type route
    slave.pcm {
        type multi
        slaves.a.pcm "sp_out_pipe"   # 
        slaves.a.channels 2
        slaves.b.pcm "sp_out"   # No conversion
        slaves.b.channels 2
        bindings.0.slave a
        bindings.0.channel 0
        bindings.1.slave a
        bindings.1.channel 1
        bindings.2.slave b
        bindings.2.channel 0
        bindings.3.slave b
        bindings.3.channel 1
    }
    ttable.0.0 1
    ttable.1.1 1
    ttable.0.2 1
    ttable.1.3 1
}

pcm.sp_out_pipe {
  type volumiofifo
  fifo "/tmp/stream.mp3"
  format_3 "S16_LE"
}

#------ End of sp ALSA Pipe section -------