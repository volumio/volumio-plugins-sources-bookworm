name: Fusion DSP Tests

on:
  push:
    paths:
      - 'fusion/**'
  pull_request:
    paths:
      - 'fusion/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: fusion
      - run: npm test
        working-directory: fusion
